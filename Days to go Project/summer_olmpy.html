<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Olympics 2028</title>
    <link rel="stylesheet" href="./summer_olmpy.css">
</head>
<body>
    <header>
        <nav>
            <div id="left">
                <ul id="navlinks" style="list-style-type: none;">
                    <li><a href="#">When is</a></li>
                    <li><a href="#">Holidays</a></li>
                    <li><a href="#">Events</a></li>
                    <li><a href="#">Calender</a></li>
                    <li><a href="#">Help</a></li>
                </ul>
            </div>
            <div id="right">
                <input type="text" placeholder="Search here">
                <button>Search</button>
            </div>
        </nav>
    </header>
    <main>
        <section id="name">
            <p id="info">How many days until</p>
            <h1>Summer Olympics 2028</h1>
            <p id="date">Friday, 21 July 2028 00:00</p>
            <p id="location">Los Angeles, USA</p>
        </section>
        <section id="day">
            <div id="days"></div>
            <p id="display_days_left">days</p>
        </section>
        <section id="time">
            <div id="timer"></div>
            <p id="display_time_left">to go </p>
        </section>
    </main>
    <footer><h6>All times are shown in Asia/Calcutta  timezone.</h6></footer>
    <script src="./summer_olmpy.js"></script>
