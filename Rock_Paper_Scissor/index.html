<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <div class="wrapper">
        <header>
            <h1>Rock Paper Scissor</h1>
        </header>
        <main>
            <section id="player1" class="players">
                <button type="button" class="btn">Computer</button>
                <div class="choice">
                    <img src="./images/RPS.jpg" alt="" id="player1_choice">
                </div>
            </section>
            <section id="result" class="players">
                <p id="result">Winner is : ?</p>
            </section>
            <section id="player2" class="players">
                <button type="button" class="btn">Player_2</button>
                <div class="choice">
                    <img src="./images/RPS.jpg" alt="" id="player2_choice">
                </div>
            </section>
        </main>
        <footer>
            <button id="Start-btn">START</button>
        </footer>
    </div>

    <script src="./index.js"></script>
</body>
</html>
